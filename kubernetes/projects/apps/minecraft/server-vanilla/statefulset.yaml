apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft-vanilla
  namespace: minecraft
spec:
  selector:
    matchLabels:
      app: minecraft-vanilla
  serviceName: minecraft-vanilla
  replicas: 2
  template:
    metadata:
      labels:
        app: minecraft-vanilla
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: minecraft-vanilla
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: minecraft
        image: itzg/minecraft-server:java25
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: minecraft-vanilla-config
        livenessProbe:
          exec:
            command: [ mc-health ]
          initialDelaySeconds: 120
          periodSeconds: 60
        readinessProbe:
          exec:
            command: [ mc-health ]
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 12
        resources:
          requests:
            cpu: 1000m
            memory: 4Gi
          limits:
            cpu: 8000m
            memory: 8Gi
        ports:
        - name: tcp
          containerPort: 25565
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ "ALL" ]
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: minecraft-vanilla-storage
          mountPath: /data
        - name: minecraft-vanilla-spigot-config
          mountPath: /data/spigot.yml
          subPath: spigot.yml
          readOnly: true
      volumes:
      - name: minecraft-vanilla-spigot-config
        configMap:
          name: minecraft-vanilla-spigot-config
  volumeClaimTemplates:
  - metadata:
      name: minecraft-vanilla-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
