apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: dennispham-me-bucket
  namespace: dennispham-me
spec:
  bucketName: dennispham-me
  storageClassName: rook-ceph-bucket
  additionalConfig:
    bucketOwner: dennispham-me
    bucketPolicy: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "PublicReadGetObject",
            "Effect": "Allow",
            "Principal": "*",
            "Action": [
              "s3:GetObject"
            ],
            "Resource": [
              "arn:aws:s3:::dennispham-me/*"
            ]
          }
        ]
      }
