apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:opencloud-configmap-writer
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - list
  - get
  - create
  - update
  - delete
- apiGroups:
  - applications.azuread.upbound.io
  resources:
  - applications
  verbs:
  - list
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:opencloud-configmap-reader
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - list
  - get
