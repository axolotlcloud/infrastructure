apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: collabora
  namespace: opencloud
spec:
  parentRefs:
  - name: axolotl
    namespace: istio-ingress
  - name: axolotl-lan
    namespace: istio-ingress
  hostnames:
  - office-collabora.axolotl.cloud
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: collabora
      port: 80
