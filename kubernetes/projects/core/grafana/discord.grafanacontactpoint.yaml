apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: discord
spec:
  name: Discord
  instanceSelector:
    matchLabels:
      dashboards: grafana
  editable: false
  receivers:
  - type: discord
    settings:
      avatar_url: https://github.com/grafana.png
      message: |
        <@306870406697189378>

        {{ template "default.message" . }}
    valuesFrom:
    - targetPath: url
      valueFrom:
        secretKeyRef:
          name: discord-secret
          key: webhookUrl
