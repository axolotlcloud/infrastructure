apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: discord
  namespace: grafana
spec:
  name: Discord
  instanceSelector:
    matchLabels:
      dashboards: grafana
  receivers:
  - type: discord
    settings:
      avatar_url: https://github.com/grafana.png
      title: >
        {{ template "discord.title" . }}
      message: |
        <@306870406697189378>

        {{ template "discord.message" . }}
    valuesFrom:
    - targetPath: url
      valueFrom:
        secretKeyRef:
          name: discord-secret
          key: webhookUrl
