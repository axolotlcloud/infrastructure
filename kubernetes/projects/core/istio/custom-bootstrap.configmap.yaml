apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-custom-bootstrap-config
  namespace: istio-ingress
data:
  custom_bootstrap.json: |
    {
      "stats_config": {
        "use_all_default_tags": true,
        "stats_tags": [
          {"tag_name": "phase", "regex": "(_phase=([a-z_]+))"},
          {"tag_name": "rule_id", "regex": "(_ruleid=([0-9]+))"},
          {"tag_name": "gateway", "regex": "(_gateway=([0-9a-z.:]+))"},
          {"tag_name": "authority", "regex": "(_authority=([0-9a-z.:]+))"}
        ]
      }
    }
