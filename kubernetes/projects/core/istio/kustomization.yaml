apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://raw.githubusercontent.com/istio/istio/refs/tags/1.29.2/samples/addons/extras/prometheus-operator.yaml
- ./custom-bootstrap.configmap.yaml
- ./gateway.yaml
- ./lan.gateway.yaml
- ./namespace.yaml
- ./networkpolicy.yaml
- ./waf.wasmplugin.yaml

helmCharts:
- name: base
  namespace: istio-system
  releaseName: istio-base
  repo: https://istio-release.storage.googleapis.com/charts
  valuesFile: base.values.yaml
  version: 1.29.2
  includeCRDs: true
- name: istiod
  namespace: istio-system
  releaseName: istio-istiod
  repo: https://istio-release.storage.googleapis.com/charts
  valuesFile: istiod.values.yaml
  version: 1.29.2
  includeCRDs: true
- name: cni
  namespace: istio-system
  releaseName: istio-cni
  repo: https://istio-release.storage.googleapis.com/charts
  valuesFile: cni.values.yaml
  version: 1.29.2
- name: ztunnel
  namespace: istio-system
  releaseName: istio-ztunnel
  repo: https://istio-release.storage.googleapis.com/charts
  valuesFile: ztunnel.values.yaml
  version: 1.29.2

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
- name: aniplix-xyz-tls-cacert
  namespace: istio-ingress
  files:
  - cacert=cloudflare.pem
- name: audreyasked-com-tls-cacert
  namespace: istio-ingress
  files:
  - cacert=cloudflare.pem
- name: axolotl-cloud-tls-cacert
  namespace: istio-ingress
  files:
  - cacert=cloudflare.pem
- name: dennispham-me-tls-cacert
  namespace: istio-ingress
  files:
  - cacert=cloudflare.pem
