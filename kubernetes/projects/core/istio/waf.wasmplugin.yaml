apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: axolotl-waf
  namespace: istio-ingress
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: axolotl
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0
  imagePullPolicy: IfNotPresent
  phase: AUTHN
  pluginConfig:
    default_directives: default
    directives_map:
      default:
      - Include @recommended-conf
      - SecRuleEngine On
      - SecAuditEngine On
      - Include @crs-setup-conf
      # Add PUT, PATCH, DELETE to allowed methods globally
      - SecAction "id:900200,phase:1,pass,nolog,t:none,setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"
      # False positive: Cloudflare mTLS certificate in XFCC header contains newlines (all domains)
      - SecRule REQUEST_HEADERS:x-forwarded-client-cert "@rx ." "id:1000001,phase:1,pass,nolog,ctl:ruleRemoveById=921140"
      # False positive (Grafana): response body replaced
      - SecRule REQUEST_HEADERS:Host "@streq grafana.axolotl.cloud" "id:1000010,phase:1,pass,nolog,ctl:responseBodyAccess=Off"
      # False positive (Grafana): PromQL queries falsely flagged as SQL injection
      - SecRule REQUEST_HEADERS:Host "@streq grafana.axolotl.cloud" "id:1000002,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@beginsWith /api/ds/query" "ctl:ruleRemoveById=942100"
      # False positive (Grafana): LogQL named capture groups (?P<name>...) falsely flagged as PHP injection and RCE
      - SecRule REQUEST_HEADERS:Host "@streq grafana.axolotl.cloud" "id:1000009,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@rx ^/api/(ds/query|query-history)" "ctl:ruleRemoveById=933120,ctl:ruleRemoveById=933160,ctl:ruleRemoveById=932235"
      # False positive (Hubble): gRPC endpoints use binary protobuf (application/octet-stream)
      - SecRule REQUEST_HEADERS:Host "@streq hubble.axolotl.cloud" "id:1000003,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@rx ^/api/(control-stream|service-map-stream)$" "setvar:'tx.allowed_request_content_type=|application/octet-stream|',ctl:ruleRemoveById=920270,ctl:ruleRemoveById=921150"
      # False positive (Jellyseerr): profileId parameter falsely flagged as LFI (.profile)
      - SecRule REQUEST_HEADERS:Host "@streq request.axolotl.cloud" "id:1000008,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@beginsWith /api/v1/request" "ctl:ruleRemoveById=930120"
      # False positive (OpenCloud): WebDAV PROPFIND method not in default allowed list
      - SecRule REQUEST_HEADERS:Host "@rx ^office(\.lan)?\.axolotl\.cloud$" "id:1000004,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@beginsWith /remote.php/" "ctl:ruleRemoveById=911100"
      # False positive (OpenCloud): `$` parameters falsely flagged as MongoDB injection
      - SecRule REQUEST_HEADERS:Host "@rx ^office(\.lan)?\.axolotl\.cloud$" "id:1000005,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@beginsWith /graph/" "ctl:ruleRemoveById=942290"
      # False positive (Radarr/Sonarr): SignalR uses text/plain content type
      - SecRule REQUEST_HEADERS:Host "@rx ^(radarr|sonarr)\.axolotl\.cloud$" "id:1000006,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@beginsWith /signalr/" "setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |text/plain|'"
      # False positive (Radarr/Sonarr): square brackets in media filenames falsely flagged as shell expressions
      - SecRule REQUEST_HEADERS:Host "@rx ^(radarr|sonarr)\.axolotl\.cloud$" "id:1000007,phase:1,pass,nolog,chain"
      - SecRule REQUEST_URI "@beginsWith /api/v3/filesystem" "ctl:ruleRemoveById=932130"
      - Include @owasp_crs/*.conf
    metric_labels:
      gateway: axolotl
